name: Build Android APK

on:
  workflow_dispatch: # Umožní spustit build ručně tlačítkem

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kód
        uses: actions/checkout@v4

      - name: Nastavení Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Nastavení Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Udělení práv pro spuštění gradlew
        run: chmod +x ./gradlew

      - name: Sestavení Debug APK
        run: ./gradlew assembleDebug

      - name: Nahrání hotového APK k dispozici ke stažení
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
