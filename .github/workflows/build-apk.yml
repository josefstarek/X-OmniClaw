name: Build Android APK

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kód
        uses: actions/checkout@v4

      - name: Nastavení Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Najít a spustit gradlew
        run: |
          echo "Hledám soubor gradlew..."
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          
          if [ -z "$GRADLEW_PATH" ]; then
            echo "Chyba: gradlew v projektu vůbec neexistuje!"
            exit 1
          fi
          
          echo "Našel jsem gradlew v: $GRADLEW_PATH"
          WORK_DIR=$(dirname "$GRADLEW_PATH")
          
          echo "Přesouvám se do: $WORK_DIR"
          cd "$WORK_DIR"
          
          echo "Povoluji spuštění..."
          chmod +x ./gradlew
          
          echo "Spouštím kompilaci..."
          ./gradlew assembleDebug

      - name: Nahrání hotového APK k dispozici ke stažení
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: |
            **/build/outputs/apk/debug/*.apk
