name: Build Android APK

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Vyřeší varování ohledně Node.js verze

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kód
        uses: actions/checkout@v4

      - name: Nastavení Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Kontrola a vygenerování Gradle Wrapperu
        run: |
          if [ ! -f "./gradlew" ]; then
            echo "gradlew nenalezen, generuji nový..."
            gradle wrapper
          fi
          chmod +x ./gradlew

      - name: Sestavení Debug APK
        run: ./gradlew assembleDebug

      - name: Nahrání hotového APK k dispozici ke stažení
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: |
            **/build/outputs/apk/debug/*.apk
